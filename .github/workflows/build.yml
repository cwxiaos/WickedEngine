name: Compile Shaders Only

on:
  push:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build-shaders:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile Offlineshadercompiler
      run: |
        xcodebuild clean build \
          -project WickedEngine/offlineshadercompiler.xcodeproj \
          -scheme offlineshadercompiler \
          -configuration Release

    - name: Generate Metal Shaders
      run: |
        BUILD_PATH="$(xcodebuild -project WickedEngine/offlineshadercompiler.xcodeproj -scheme offlineshadercompiler -configuration Release -showBuildSettings | grep -m 1 "BUILT_PRODUCTS_DIR" | awk -F' = ' '{print $2}')"
        
        cd WickedEngine
        "${BUILD_PATH}/offlineshadercompiler" metal rebuild shaderdump
        cd ..

    - name: Prepare Artifacts Directory
      run: |
        mkdir -p ./output_shaders/metal
        
        if [ -d "WickedEngine/shaders/metal" ]; then
          echo "Found compiled shaders in WickedEngine/shaders/metal, copying..."
          cp -R WickedEngine/shaders/metal/ ./output_shaders/metal/
        else
          echo "Warning: Expected directory not found. Scanning for generated .cso files..."
          find . -name "*.cso" -exec cp {} ./output_shaders/metal/ \;
        fi

    - name: Package and Upload Shaders
      uses: actions/upload-artifact@v4
      with:
        name: Metal-Shaders-Artifact
        path: ./output_shaders/
